kind = "web"
previewPath = "/"
title = "Slash Football"
version = "1.0.0"
id = "artifacts/slash-football"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18993

[services.development]
run = "pnpm --filter @workspace/slash-football run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/slash-football", "run", "build" ]
publicDir = "artifacts/slash-football/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18993"
BASE_PATH = "/"
