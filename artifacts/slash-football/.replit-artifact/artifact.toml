kind = "mobile"
previewPath = "/"
title = "Slash Football"
version = "1.0.0"
id = "artifacts/slash-football"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21394

[services.development]
run = "pnpm --filter @workspace/slash-football run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/slash-football", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/slash-football", "run", "serve" ]

[services.env]
PORT = "21394"
BASE_PATH = "/"
